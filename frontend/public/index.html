<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%PUBLIC_URL%/favicon.png" type="image/png" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="StatMoose - Sports Stats Tracker for Basketball and Football" />
        <meta property="og:title" content="StatMoose" />
        <meta property="og:description" content="StatMoose - Sports Stats Tracker for Basketball and Football" />
        <meta property="og:type" content="website" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="StatMoose" />
        <meta name="twitter:description" content="StatMoose - Sports Stats Tracker for Basketball and Football" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>StatMoose</title>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        <!--
        These two scripts have been added for the Visual Edits, please do not edit or remove them
        -->
        <script>
            // Only load visual edit scripts when inside an iframe
            if (window.self !== window.top) {
                // Load debug monitor script
                var debugMonitorScript = document.createElement('script');
                debugMonitorScript.src = 'https://assets.emergent.sh/scripts/debug-monitor.js';
                document.head.appendChild(debugMonitorScript);

                // Configure Tailwind
                window.tailwind = window.tailwind || {};
                tailwind.config = {
                    corePlugins: { preflight: false },
                };

                // Load Tailwind CDN
                var tailwindScript = document.createElement('script');
                tailwindScript.src = 'https://cdn.tailwindcss.com';
                document.head.appendChild(tailwindScript);
            }
        </script>
        <style>
            /* Initial loading screen styles */
            #initial-loader {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #18181b 0%, #000000 50%, #27272a 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 9999;
                transition: opacity 0.3s ease-out;
            }
            #initial-loader.fade-out {
                opacity: 0;
                pointer-events: none;
            }
            .loader-container {
                position: relative;
                width: 96px;
                height: 96px;
                margin-bottom: 32px;
            }
            .loader-logo {
                width: 96px;
                height: 96px;
                object-fit: contain;
            }
            .loader-spinner {
                position: absolute;
                top: -24px;
                left: -24px;
                width: 144px;
                height: 144px;
                animation: spin 2s linear infinite;
            }
            .loader-spinner circle.track {
                stroke: rgba(255, 255, 255, 0.1);
            }
            .loader-spinner circle.progress {
                stroke: white;
                stroke-dasharray: 100 314;
                stroke-linecap: round;
            }
            @keyframes spin {
                from { transform: rotate(0deg); }
                to { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        
        <!-- Initial loading screen with logo and spinner -->
        <div id="initial-loader">
            <div class="loader-container">
                <!-- StatMoose Logo -->
                <img 
                    src="%PUBLIC_URL%/logo-white.png" 
                    alt="StatMoose" 
                    class="loader-logo"
                    onerror="this.style.display='none'"
                />
                <!-- Spinning circle around logo -->
                <svg class="loader-spinner" viewBox="0 0 144 144">
                    <circle
                        class="track"
                        cx="72"
                        cy="72"
                        r="68"
                        stroke-width="2"
                        fill="none"
                    />
                    <circle
                        class="progress"
                        cx="72"
                        cy="72"
                        r="68"
                        stroke-width="2"
                        fill="none"
                    />
                </svg>
            </div>
        </div>
        
        <div id="root"></div>
        
        <script>
            // Hide loader once React app is ready
            window.addEventListener('load', function() {
                // Wait a brief moment for React to render
                setTimeout(function() {
                    var loader = document.getElementById('initial-loader');
                    if (loader) {
                        loader.classList.add('fade-out');
                        // Remove from DOM after fade animation
                        setTimeout(function() {
                            if (loader.parentNode) {
                                loader.parentNode.removeChild(loader);
                            }
                        }, 300);
                    }
                }, 100);
            });
        </script>
        <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    </body>
</html>
